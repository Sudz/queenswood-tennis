<!DOCTYPE html>
<html lang="en-ZA">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <meta name="description"
        content="Queenswood Tennis & Pickleball Club — Pretoria's premier racket sports destination since the 1950s. Book courts, join leagues, and elevate your game.">
    <title>Queenswood Sports Club | Elite Tennis & Pickleball — Pretoria</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-lime: #a3e635;
            --brand-blue: #3b82f6;
            --brand-slate: #020617;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--brand-slate);
            color: white;
            overflow-x: hidden;
        }

        .utr-gradient {
            background: linear-gradient(135deg, #1e40af 0%, #a3e635 100%);
        }

        .glass-island {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bento-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bento-card:hover {
            border-color: rgba(163, 230, 53, 0.3);
            transform: translateY(-4px);
            background: rgba(30, 41, 59, 0.6);
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .perspective-1000 {
            perspective: 1000px;
        }

        .tilt-card {
            transition: transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }

        .text-hero-mask {
            background: linear-gradient(to bottom, #fff 20%, rgba(255, 255, 255, 0.7));
            -webkit-background-clip: text;
            background-clip: text;
            letter-spacing: -0.05em;
            filter: drop-shadow(0 0 40px rgba(0, 0, 0, 0.5));
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .ambient-light {
            pointer-events: none;
            position: absolute;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            z-index: 1;
            transform: translate(-50%, -50%);
        }

        .animate-modern {
            animation: fade-in-up 0.8s ease-out forwards;
        }

        .custom-cursor {
            width: 20px;
            height: 20px;
            background: rgba(163, 230, 53, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            mix-blend-mode: difference;
        }

        @keyframes strobe {

            0%,
            20%,
            40%,
            60%,
            80%,
            100% {
                opacity: 1;
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                opacity: 0;
            }
        }

        .strobe-text {
            animation: strobe 0.4s ease-out forwards;
        }

        @keyframes toss-up {
            0% {
                transform: translateY(100px) scale(0.8);
                opacity: 0;
                filter: blur(20px);
            }

            40% {
                transform: translateY(-30px) scale(1.05);
                opacity: 1;
                filter: blur(2px);
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }

        @keyframes smash-down {
            0% {
                transform: translateY(-200px) scale(3);
                opacity: 0;
                filter: blur(30px);
            }

            30% {
                transform: translateY(0) scale(0.9);
                opacity: 1;
                filter: blur(5px);
            }

            50% {
                transform: translateY(0) scale(1.1);
            }

            100% {
                transform: translateY(0) scale(1);
                opacity: 1;
                filter: blur(0);
            }
        }

        @keyframes ground-shake {

            0%,
            100% {
                transform: translate(0, 0);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: translate(-4px, -4px);
            }

            20%,
            40%,
            60%,
            80% {
                transform: translate(4px, 4px);
            }
        }

        .toss-letter {
            display: inline-block;
            animation: toss-up 1.0s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        .smash-letter {
            display: inline-block;
            animation: smash-down 0.7s cubic-bezier(0.13, 1.62, 0.45, 0.94) forwards;
            opacity: 0;
        }

        .cursor-hover {
            transform: scale(4);
            background: rgba(163, 230, 53, 0.2);
        }

        @keyframes strike-in {
            0% {
                transform: translateX(-100%) skewX(-30deg);
                filter: blur(20px);
                opacity: 0;
            }

            50% {
                transform: translateX(10%) skewX(0deg);
                filter: blur(5px);
                opacity: 0.8;
            }

            100% {
                transform: translateX(0) skewX(0deg);
                filter: blur(0);
                opacity: 1;
            }
        }

        .strike-letter {
            display: inline-block;
            animation: strike-in 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        /* Final Pitch Polish Styles */
        .scanline-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0.2;
        }

        @keyframes particle-burst {
            0% {
                transform: scale(1) translate(-50%, -50%);
                opacity: 1;
            }

            100% {
                transform: scale(4) translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #a3e635;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            animation: particle-burst 0.8s cubic-bezier(0, 0, 0.2, 1) forwards;
        }

        .stagger-link {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .mobile-menu-overlay.open .stagger-link {
            opacity: 1;
            transform: translateY(0);
        }

        .magnetic-wrap {
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Scroll Reveal System */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-left {
            opacity: 0;
            transform: translateX(-60px);
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reveal-left.active {
            opacity: 1;
            transform: translateX(0);
        }

        .reveal-right {
            opacity: 0;
            transform: translateX(60px);
            transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .reveal-right.active {
            opacity: 1;
            transform: translateX(0);
        }

        .mobile-menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .mobile-menu-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        @media (max-width: 1024px) {
            .hero-title-size {
                font-size: clamp(3rem, 12vw, 5rem);
                line-height: 1;
            }
        }

        /* Mobile optimizations */
        @media (max-width: 640px) {
            .hero-title-size {
                font-size: clamp(2.2rem, 10vw, 3.5rem);
                line-height: 0.95;
            }

            .bento-card {
                border-radius: 1.5rem;
            }

            .bento-card:hover {
                transform: none;
            }

            nav.glass-island {
                padding-left: 12px;
                padding-right: 12px;
            }

            .container {
                padding-left: 16px;
                padding-right: 16px;
            }

            /* Prevent horizontal scroll on mobile */
            body {
                overflow-x: hidden;
                width: 100%;
                position: relative;
            }
        }

        /* Better scrolling on mobile */
        .overflow-x-auto {
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        .overflow-x-auto>* {
            scroll-snap-align: start;
        }

        /* Prevent background scroll when mobile menu is open */
        body.menu-open {
            overflow: hidden;
            height: 100vh;
        }

        /* Hide scrollbar but keep scrolling */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Smooth touch scrolling for Android */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        section,
        div {
            -webkit-overflow-scrolling: touch;
        }

        /* Safe area for notched phones */
        body {
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        /* Club name transition */
        @keyframes club-fade {
            0% {
                opacity: 0;
                transform: translateY(8px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Booking step slide animation */
        @keyframes slide-in-right {
            from {
                opacity: 0;
                transform: translateX(40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slide-in-left {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide-in {
            animation: slide-in-right 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .slide-back {
            animation: slide-in-left 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        /* Time slot grid on very small screens */
        @media (max-width: 400px) {
            .time-grid {
                grid-template-columns: repeat(3, 1fr) !important;
            }
        }

        /* Sticky booking bottom bar */
        .booking-sticky-bar {
            position: sticky;
            bottom: 0;
            z-index: 20;
            padding: 16px 0 calc(16px + env(safe-area-inset-bottom, 0));
            background: linear-gradient(to top, rgba(2, 6, 23, 0.98) 60%, transparent);
        }
    </style>

</head>

<body class="bg-slate-950 text-white font-primary selection:bg-lime-400 selection:text-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SPORTS = [
            { id: 'Tennis', label: '🎾 Tennis', video: 'https://player.vimeo.com/external/370331493.sd.mp4?s=7b23158f94e69da598bc36028f892a08832a8a81&profile_id=139&oauth2_token_id=57447761' },
            { id: 'Both', label: '⚡ Both', video: 'https://player.vimeo.com/external/481487537.sd.mp4?s=8553220ed3451fc77c68758b99c855a02e6005c2&profile_id=139&oauth2_token_id=57447761' },
            { id: 'Pickleball', label: '🏓 Pickleball', video: 'https://player.vimeo.com/external/517090025.sd.mp4?s=f52033bc69f5280b3d115fa766572e705b4a9a08&profile_id=139&oauth2_token_id=57447761' }
        ];

        const COURTS = [
            { id: 1, name: 'Court 1', type: 'tennis', features: ['Floodlights', 'Hard Court'] },
            { id: 2, name: 'Court 2', type: 'tennis', features: ['Floodlights', 'Hard Court'] },
            { id: 3, name: 'Court 3', type: 'tennis', features: ['Floodlights', 'Hard Court'] },
            { id: 4, name: 'Court 4', type: 'multi', features: ['Floodlights', 'Hard Court', 'Pickleball Lines'] },
            { id: 5, name: 'Court 5', type: 'multi', features: ['Floodlights', 'Hard Court', 'Pickleball Lines'] }
        ];

        // ── Registration Form Component ────────────────────────────────────────────
        function RegistrationForm({ regMode, setRegMode }) {
            const PLANS = [
                { key: 'adult', label: 'Adult Pro', monthly: 150, annual: 120 },
                { key: 'masters', label: 'Masters', monthly: 120, annual: 95 },
                { key: 'junior', label: 'Junior Ace', monthly: 75, annual: 60 },
            ];
            const [selPlan, setSelPlan] = React.useState('adult');
            const [selBilling, setSelBilling] = React.useState('monthly');
            const [loading, setLoading] = React.useState(false);

            const activePlan = PLANS.find(p => p.key === selPlan);
            const monthlyFee = selBilling === 'annual' ? activePlan.annual : activePlan.monthly;
            const firstTotal = monthlyFee + 90;

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                const fd = new FormData(e.target);
                const payload = {
                    plan: regMode === 'league' ? 'league' : selPlan,
                    billingCycle: selBilling,
                    fullName: fd.get('fullName'),
                    email: fd.get('email'),
                    whatsapp: fd.get('whatsapp'),
                    utrDupr: fd.get('utrDupr') || null,
                };
                try {
                    const res = await fetch('https://SJR_SUPABASE_ID.supabase.co/functions/v1/create-membership-checkout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                    });
                    const data = await res.json();
                    if (data.redirectUrl) {
                        window.location.href = data.redirectUrl;
                    } else if (data.success) {
                        alert("League registration confirmed! We'll WhatsApp you the details.");
                        setRegMode(null);
                    } else {
                        alert('Error: ' + (data.error || 'Something went wrong.'));
                    }
                } catch (err) {
                    alert('Network error. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <form className="space-y-5" onSubmit={handleSubmit}>
                    {/* Personal details */}
                    <div>
                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 block">Full Name</label>
                        <input name="fullName" type="text" required placeholder="John Doe"
                            className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 font-black text-sm focus:border-lime-400 outline-none transition-all placeholder:text-white/10" />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div>
                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 block">Email</label>
                            <input name="email" type="email" required placeholder="john@example.com"
                                className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 font-black text-sm focus:border-lime-400 outline-none transition-all placeholder:text-white/10" />
                        </div>
                        <div>
                            <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 block">WhatsApp</label>
                            <input name="whatsapp" type="tel" required placeholder="+27 …"
                                className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 font-black text-sm focus:border-lime-400 outline-none transition-all placeholder:text-white/10" />
                        </div>
                    </div>

                    {/* Plan-specific section */}
                    {regMode === 'membership' ? (
                        <>
                            <div>
                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 block">Select Plan</label>
                                <div className="grid grid-cols-3 gap-3">
                                    {PLANS.map(p => (
                                        <button key={p.key} type="button" onClick={() => setSelPlan(p.key)}
                                            className={`${selPlan === p.key ? 'bg-white text-black border-white' : 'text-slate-500 hover:text-white border-white/10'} py-4 px-3 rounded-2xl border font-black text-[10px] uppercase tracking-wider transition-all`}>
                                            {p.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-3 block">Billing Cycle</label>
                                <div className="grid grid-cols-2 gap-3">
                                    {['monthly', 'annual'].map(b => (
                                        <button key={b} type="button" onClick={() => setSelBilling(b)}
                                            className={`${selBilling === b ? 'bg-white text-black border-white' : 'text-slate-500 hover:text-white border-white/10'} py-4 rounded-2xl border font-black text-[10px] uppercase tracking-wider transition-all`}>
                                            {b}{b === 'annual' ? ' (Save 20%)' : ''}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            {/* Live price breakdown */}
                            <div className="bg-white/5 border border-white/10 rounded-2xl p-5 space-y-3">
                                <div className="flex justify-between text-[10px] font-black uppercase tracking-widest text-slate-500">
                                    <span>{activePlan.label} ({selBilling})</span>
                                    <span>R{monthlyFee}/mo</span>
                                </div>
                                <div className="flex justify-between text-[10px] font-black uppercase tracking-widest text-slate-500">
                                    <span>Once-off joining fee</span><span>R90</span>
                                </div>
                                <div className="border-t border-white/10 pt-3 flex justify-between font-black uppercase tracking-widest">
                                    <span className="text-xs">Due today via Yoco</span>
                                    <span className="text-lime-400 text-lg">R{firstTotal}</span>
                                </div>
                            </div>
                        </>
                    ) : (
                        <>
                            <div>
                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 block">UTR / DUPR Rating</label>
                                <input name="utrDupr" type="text" placeholder="e.g. 6.5"
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 font-black text-sm focus:border-lime-400 outline-none transition-all placeholder:text-white/10" />
                            </div>
                            <div className="bg-white/5 border border-white/10 rounded-2xl p-5 flex justify-between items-center">
                                <span className="text-[10px] font-black uppercase tracking-widest text-slate-500">Queenswood League Entry</span>
                                <span className="text-lime-400 font-black text-lg">Free*</span>
                            </div>
                            <p className="text-slate-600 text-[9px] font-black uppercase tracking-widest">* Match fees apply per round</p>
                        </>
                    )}

                    <button type="submit" disabled={loading}
                        className="w-full bg-lime-400 text-black py-5 rounded-3xl font-black uppercase tracking-widest text-xs hover:scale-105 transition-all shadow-2xl shadow-lime-400/20 disabled:opacity-60">
                        {loading ? 'Processing…' : (regMode === 'membership' ? 'Pay & Register via Yoco →' : 'Submit Registration →')}
                    </button>
                </form>
            );
        }

        // ── Club Name Rotation Data ────────────────────────────────────────────
        const CLUB_NAMES = [
            { label: 'Queenswood Tennis Club', color: '#3b82f6', accent: 'text-blue-500', bg: 'bg-blue-500/10', border: 'border-blue-500/30', icon: '🎾' },
            { label: 'Queenswood Pickleball Club', color: '#a3e635', accent: 'text-lime-400', bg: 'bg-lime-400/10', border: 'border-lime-400/30', icon: '🏓' },
            { label: 'Queenswood Sports Club', color: '#f59e0b', accent: 'text-amber-400', bg: 'bg-amber-400/10', border: 'border-amber-400/30', icon: '⚡' },
        ];

        // ── Coach Cards Data ────────────────────────────────────────────
        const COACHES = [
            {
                name: 'Carla Smith',
                title: 'Head Tennis Coach',
                image: 'https://images.unsplash.com/photo-1594744803329-e58b31de8bf5?auto=format&fit=crop&q=80&w=150&h=150',
                specialty: 'Singles Strategy & Power Serve',
                rating: '9.2',
                experience: '12 yrs',
                certifications: ['ITF Level 3', 'TSA Elite Coach'],
                nextSession: 'Tomorrow 07:00',
                rate: 'R450/hr',
                wins: '340+',
                bio: 'Former WTA-ranked player bringing world-class technique to Queenswood.',
            },
            {
                name: 'Joe Ladder',
                title: 'Pickleball & Doubles Specialist',
                image: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=150&h=150',
                specialty: 'Doubles Tactics & Net Play',
                rating: '8.7',
                experience: '8 yrs',
                certifications: ['PPR Certified', 'TSA Coach'],
                nextSession: 'Today 16:00',
                rate: 'R350/hr',
                wins: '210+',
                bio: 'Pickleball pioneer in SA, transforming club play with competitive edge.',
            },
        ];

        function App() {
            const [activeSport, setActiveSport] = useState('Pickleball');
            const [loadedSports, setLoadedSports] = useState(['Pickleball']);
            const [billingCycle, setBillingCycle] = useState('monthly');
            const [selectedTime, setSelectedTime] = useState(null);
            const [selectedCourt, setSelectedCourt] = useState(null);
            const [bookingStep, setBookingStep] = useState('time');
            const [checkoutStatus, setCheckoutStatus] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [heroTilt, setHeroTilt] = useState({ x: 0, y: 0 });
            const [scrollY, setScrollY] = useState(0);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [selectedDate, setSelectedDate] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [isProfileOpen, setIsProfileOpen] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [liveStats, setLiveStats] = useState({ activePlayers: 12, nextEvent: 'Mixed Social @ 18:00', weather: '24°C Sunny' });
            const [clubNameIdx, setClubNameIdx] = useState(0);
            const [showSignInModal, setShowSignInModal] = useState(false);
            const [signInForBooking, setSignInForBooking] = useState(false);
            const [leaderboard] = useState({
                mens: [
                    { rank: 1, name: 'Xander van Zyl', rating: '7.82', change: '+2', sport: 'tennis' },
                    { rank: 2, name: 'Brendan Louw', rating: '7.65', change: '+1', sport: 'tennis' },
